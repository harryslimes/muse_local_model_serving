services:
  chatterbox-tts:
    build:
      context: .
      dockerfile: docker/Dockerfile.chatterbox-tts
    image: muse/chatterbox-tts:local
    gpus: all
    environment:
      LISTEN_PORT: ${CHATTERBOX_PORT:-4123}
      VOICES_DIR: /voices
      PYTORCH_NVFUSER_DISABLE: "1"
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "${CHATTERBOX_BIND_IP:-127.0.0.1}:${CHATTERBOX_PORT:-4123}:${CHATTERBOX_PORT:-4123}"
    volumes:
      - ${MODEL_ROOT_HOST:-./models}:/models
      - ${VOICES_DIR_HOST:-./voices}:/voices
      - ${HF_CACHE_HOST:-chatterbox-hf-cache}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${CHATTERBOX_PORT:-4123}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 120s

volumes:
  chatterbox-hf-cache:
