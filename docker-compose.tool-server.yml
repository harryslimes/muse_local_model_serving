services:
  searxng:
    image: searxng/searxng:latest
    container_name: muse-searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8888}/
    ports:
      - "${SEARXNG_BIND_IP:-127.0.0.1}:${SEARXNG_PORT:-8888}:8080"
    volumes:
      - ./runtime/searxng:/etc/searxng:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/search?q=test&format=json\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  tool-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.tool-server
    image: muse/tool-server:local
    container_name: muse-tool-server
    environment:
      LISTEN_PORT: ${TOOL_SERVER_PORT:-4130}
      SEARXNG_URL: http://searxng:8080
      CRAWL_MAX_CHARS: ${CRAWL_MAX_CHARS:-8000}
      SEARCH_MAX_RESULTS: ${SEARCH_MAX_RESULTS:-5}
    ports:
      - "${TOOL_SERVER_BIND_IP:-127.0.0.1}:${TOOL_SERVER_PORT:-4130}:${TOOL_SERVER_PORT:-4130}"
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${TOOL_SERVER_PORT:-4130}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
