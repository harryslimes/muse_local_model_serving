services:
  parakeet-stt:
    build:
      context: .
      dockerfile: docker/Dockerfile.parakeet-stt
    image: muse/parakeet-stt:local
    gpus: all
    environment:
      LISTEN_PORT: ${PARAKEET_PORT:-4124}
      PARAKEET_ONNX_MODEL: ${PARAKEET_ONNX_MODEL:-nemo-parakeet-tdt-0.6b-v2}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "${PARAKEET_BIND_IP:-127.0.0.1}:${PARAKEET_PORT:-4124}:${PARAKEET_PORT:-4124}"
    volumes:
      - ${MODEL_ROOT_HOST:-./models}:/models
      - ${HF_CACHE_HOST:-parakeet-hf-cache}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PARAKEET_PORT:-4124}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 120s

volumes:
  parakeet-hf-cache:
