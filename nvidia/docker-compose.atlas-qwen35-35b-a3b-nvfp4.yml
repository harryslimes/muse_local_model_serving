services:
  atlas-qwen35-35b-a3b-nvfp4:
    image: ${ATLAS_IMAGE:-avarok/atlas-qwen3.5-35b-a3b-alpha:latest}
    platform: ${ATLAS_PLATFORM:-linux/arm64}
    gpus: all
    ipc: host
    ulimits:
      memlock: -1
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN:-}
      ATLAS_MODEL_REPO: ${ATLAS_MODEL_REPO:-Kbenkhaled/Qwen3.5-35B-A3B-NVFP4}
      ATLAS_KV_CACHE_DTYPE: ${ATLAS_KV_CACHE_DTYPE:-nvfp4}
      ATLAS_MTP_QUANTIZATION: ${ATLAS_MTP_QUANTIZATION:-nvfp4}
      ATLAS_SCHEDULING_POLICY: ${ATLAS_SCHEDULING_POLICY:-slai}
      ATLAS_MAX_SEQ_LEN: ${ATLAS_MAX_SEQ_LEN:-131072}
      ATLAS_MAX_PREFILL_TOKENS: ${ATLAS_MAX_PREFILL_TOKENS:-1024}
    command:
      - serve
      - ${ATLAS_MODEL_REPO:-Kbenkhaled/Qwen3.5-35B-A3B-NVFP4}
      - --speculative
      - --kv-cache-dtype
      - ${ATLAS_KV_CACHE_DTYPE:-nvfp4}
      - --mtp-quantization
      - ${ATLAS_MTP_QUANTIZATION:-nvfp4}
      - --scheduling-policy
      - ${ATLAS_SCHEDULING_POLICY:-slai}
      - --max-seq-len
      - "${ATLAS_MAX_SEQ_LEN:-131072}"
      - --max-prefill-tokens
      - "${ATLAS_MAX_PREFILL_TOKENS:-1024}"
      - --enable-prefix-caching
    ports:
      - "${LISTEN_IP:-127.0.0.1}:${LISTEN_PORT:-18888}:8888"
    volumes:
      - ${HF_CACHE_HOST:-./runtime/atlas_qwen35_35b_a3b_nvfp4_server/hf-cache}:/root/.cache/huggingface
      - ${RUN_ROOT_HOST:-./runtime/atlas_qwen35_35b_a3b_nvfp4_server}:/runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8888/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 60
      start_period: 90s

  atlas-qwen35-35b-a3b-nvfp4-downloader:
    image: python:3.12-slim
    profiles: ["tools"]
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        python -m pip install --no-cache-dir huggingface_hub
        hf download "${ATLAS_MODEL_REPO:-Kbenkhaled/Qwen3.5-35B-A3B-NVFP4}" --cache-dir /root/.cache/huggingface/hub
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN:-}
      ATLAS_MODEL_REPO: ${ATLAS_MODEL_REPO:-Kbenkhaled/Qwen3.5-35B-A3B-NVFP4}
    volumes:
      - ${HF_CACHE_HOST:-./runtime/atlas_qwen35_35b_a3b_nvfp4_server/hf-cache}:/root/.cache/huggingface
