services:
  flux2-klein-9b-gguf-image-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.flux2
      args:
        CUDA_ARCH: ${CUDA_ARCH:-121}
    image: muse/flux2-image-server:local
    gpus: all
    environment:
      MODEL_ROOT: /models
      FLUX2_KLEIN_PROFILE: ${FLUX2_KLEIN_PROFILE:-9b-fp8}
      HF_TOKEN: ${HF_TOKEN:-}
      LISTEN_IP: ${LISTEN_IP:-0.0.0.0}
      LISTEN_PORT: ${LISTEN_PORT:-1235}
      CFG_SCALE: ${CFG_SCALE:-1.0}
      SAMPLING_METHOD: ${SAMPLING_METHOD:-euler}
      STEPS: ${STEPS:-4}
      OFFLOAD_TO_CPU: ${OFFLOAD_TO_CPU:-false}
      DIFFUSION_MODEL: ${DIFFUSION_MODEL:-/models/unsloth/FLUX.2-klein-9B-GGUF/flux-2-klein-9b-Q5_K_M.gguf}
      VAE_MODEL: ${VAE_MODEL:-/models/Comfy-Org/vae-text-encorder-for-flux-klein-4b/split_files/vae/flux2-vae.safetensors}
      LLM_MODEL: ${LLM_MODEL:-/models/Comfy-Org/vae-text-encorder-for-flux-klein-9b/split_files/text_encoders/qwen_3_8b.safetensors}
      SDCPP_EXTRA_FLAGS: ${SDCPP_EXTRA_FLAGS:-}
      DOWNLOAD_ONLY: ${DOWNLOAD_ONLY:-false}
    ports:
      - "127.0.0.1:${LISTEN_PORT:-1235}:${LISTEN_PORT:-1235}"
    volumes:
      - ${MODEL_ROOT_HOST:-./models}:/models
      - ${RUN_ROOT_HOST:-./runtime/flux2_klein_9b_gguf_server}:/runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${LISTEN_PORT:-1235}/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 40
      start_period: 20s
